spring:
  main:
    lazy-initialization: true
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false
    redis:
      enabled: false
