spring:
  datasource:
    url: jdbc:h2:mem:college_portal;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: never
  cache:
    type: simple
  data:
    redis:
      repositories:
        enabled: false

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false
