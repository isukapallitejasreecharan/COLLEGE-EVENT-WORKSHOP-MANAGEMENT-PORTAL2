spring:
  application:
    name: college-event-portal
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  jackson:
    serialization:
      write-dates-as-timestamps: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls:
            enable: ${MAIL_STARTTLS:false}

server:
  port: 8080
  servlet:
    context-path: /api

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  jwt:
    secret: ${JWT_SECRET:ZmFrZS1kZXZlbG9wbWVudC1zZWNyZXQtbXVzdC1iZS1vdmVycmlkZGVuLWluLXByb2Q=}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:7200000}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
    refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  uploads-dir: ${UPLOADS_DIR:uploads}
  certificate-signatory: ${CERTIFICATE_SIGNATORY:Dean of Student Affairs}
  reminders:
    cron: ${EVENT_REMINDER_CRON:0 0/30 * * * *}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,caches
  endpoint:
    health:
      show-details: always
